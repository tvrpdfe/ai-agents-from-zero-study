<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">Agent 中间件拦截位置</title>
  <desc id="desc">中间件可以在上下文进入模型前、模型调用前后、工具调用前后和子智能体执行链路中统一增加治理规则。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3e4a5a"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #172033; }
      .title { font-size: 30px; font-weight: 700; }
      .subtitle { font-size: 16px; fill: #5b6b7e; }
      .label { font-size: 18px; font-weight: 700; }
      .body { font-size: 14px; fill: #506176; }
      .stage { rx: 12; ry: 12; stroke-width: 2; }
      .guard { rx: 10; ry: 10; stroke-width: 2; stroke-dasharray: 7 5; }
      .line { stroke: #3e4a5a; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1120" height="620" fill="#f7f8fb"/>
  <text x="56" y="62" class="title">中间件不是做事的人，而是链路上的检查口</text>
  <text x="56" y="94" class="subtitle">工具负责执行业务，中间件负责压缩、限流、记录、脱敏、重试和异常治理。</text>

  <rect x="70" y="230" width="150" height="84" class="stage" fill="#ffffff" stroke="#b6c2d2"/>
  <text x="110" y="266" class="label">Agent</text>
  <text x="98" y="292" class="body">规划下一步</text>

  <rect x="316" y="118" width="188" height="78" class="guard" fill="#fff7e8" stroke="#d8921f"/>
  <text x="346" y="150" class="label">上下文中间件</text>
  <text x="346" y="176" class="body">摘要、脱敏、裁剪</text>

  <rect x="316" y="230" width="188" height="84" class="stage" fill="#e9f7f2" stroke="#2d9d78"/>
  <text x="362" y="266" class="label">模型调用</text>
  <text x="346" y="292" class="body">判断工具或生成回复</text>

  <rect x="316" y="350" width="188" height="78" class="guard" fill="#eef2ff" stroke="#6070d6"/>
  <text x="346" y="382" class="label">模型中间件</text>
  <text x="346" y="408" class="body">限次、重试、降级</text>

  <rect x="616" y="118" width="188" height="78" class="guard" fill="#fef2f2" stroke="#d75a4a"/>
  <text x="646" y="150" class="label">工具中间件</text>
  <text x="646" y="176" class="body">日志、权限、包装结果</text>

  <rect x="616" y="230" width="188" height="84" class="stage" fill="#ffffff" stroke="#7a8ba0"/>
  <text x="680" y="266" class="label">工具</text>
  <text x="650" y="292" class="body">搜索、SQL、文件</text>

  <rect x="616" y="350" width="188" height="78" class="guard" fill="#ecfeff" stroke="#0891b2"/>
  <text x="646" y="382" class="label">子智能体中间件</text>
  <text x="646" y="408" class="body">分层治理与隔离</text>

  <rect x="900" y="230" width="150" height="84" class="stage" fill="#ffffff" stroke="#b6c2d2"/>
  <text x="942" y="266" class="label">结果</text>
  <text x="920" y="292" class="body">回复或事件</text>

  <path d="M 220 272 L 316 272" class="line"/>
  <path d="M 504 272 L 616 272" class="line"/>
  <path d="M 804 272 L 900 272" class="line"/>
  <path d="M 410 196 L 410 230" class="line"/>
  <path d="M 410 350 L 410 314" class="line"/>
  <path d="M 710 196 L 710 230" class="line"/>
  <path d="M 710 350 L 710 314" class="line"/>

  <rect x="134" y="500" width="852" height="58" rx="10" ry="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="168" y="535" class="body">读法：中间件可以插在多处，但它不替代业务工具；它给长任务、多智能体和前后端联动加工程边界。</text>
</svg>
