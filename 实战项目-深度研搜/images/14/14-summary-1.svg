<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="700" viewBox="0 0 1120 700" role="img" aria-labelledby="title desc">
  <title id="title">深度研搜项目闭环</title>
  <desc id="desc">用户通过前端提交任务和上传文件，FastAPI 启动后台任务，主智能体调度三个子智能体和文件工具，WebSocket 回传进度，最终生成 Markdown 或 PDF 文件。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #172033; }
      .title { font-size: 30px; font-weight: 700; }
      .subtitle { font-size: 16px; fill: #5f6f82; }
      .label { font-size: 18px; font-weight: 700; }
      .body { font-size: 14px; fill: #4d5f73; }
      .small { font-size: 13px; fill: #64748b; }
      .box { rx: 12; ry: 12; stroke-width: 2; }
      .band { rx: 18; ry: 18; stroke-width: 2; }
      .line { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .soft { stroke: #8091a5; stroke-width: 2; fill: none; marker-end: url(#arrow); stroke-dasharray: 8 6; }
    </style>
  </defs>

  <rect width="1120" height="700" fill="#f7f8fb"/>
  <text x="56" y="62" class="title">深度研搜从输入到交付的完整闭环</text>
  <text x="56" y="94" class="subtitle">HTTP 负责启动任务，WebSocket 负责持续回传，Agent 负责调度和交付文件。</text>

  <rect x="52" y="140" width="230" height="420" class="band" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="94" y="180" class="label">前端页面</text>
  <rect x="84" y="220" width="166" height="64" class="box" fill="#eef2ff" stroke="#6070d6"/>
  <text x="112" y="258" class="body">输入任务</text>
  <rect x="84" y="316" width="166" height="64" class="box" fill="#eef2ff" stroke="#6070d6"/>
  <text x="112" y="354" class="body">上传附件</text>
  <rect x="84" y="412" width="166" height="64" class="box" fill="#eef2ff" stroke="#6070d6"/>
  <text x="112" y="450" class="body">查看进度和文件</text>

  <rect x="354" y="140" width="230" height="420" class="band" fill="#fff7e8" stroke="#d8921f"/>
  <text x="414" y="180" class="label">FastAPI</text>
  <rect x="386" y="220" width="166" height="64" class="box" fill="#ffffff" stroke="#b6c2d2"/>
  <text x="414" y="258" class="body">/api/task</text>
  <rect x="386" y="316" width="166" height="64" class="box" fill="#ffffff" stroke="#b6c2d2"/>
  <text x="414" y="354" class="body">/api/upload</text>
  <rect x="386" y="412" width="166" height="64" class="box" fill="#ffffff" stroke="#b6c2d2"/>
  <text x="414" y="450" class="body">/ws/thread_id</text>

  <rect x="656" y="140" width="230" height="420" class="band" fill="#e9f7f2" stroke="#2d9d78"/>
  <text x="716" y="180" class="label">Agent 后台任务</text>
  <rect x="688" y="220" width="166" height="64" class="box" fill="#ffffff" stroke="#b6c2d2"/>
  <text x="716" y="258" class="body">run_deep_agent</text>
  <rect x="688" y="316" width="166" height="64" class="box" fill="#ffffff" stroke="#b6c2d2"/>
  <text x="716" y="354" class="body">三个子智能体</text>
  <rect x="688" y="412" width="166" height="64" class="box" fill="#ffffff" stroke="#b6c2d2"/>
  <text x="716" y="450" class="body">文件工具</text>

  <rect x="946" y="220" width="130" height="256" class="band" fill="#ecfeff" stroke="#0891b2"/>
  <text x="978" y="262" class="label">交付物</text>
  <text x="976" y="314" class="body">最终回答</text>
  <text x="976" y="354" class="body">Markdown</text>
  <text x="976" y="394" class="body">PDF</text>
  <text x="976" y="434" class="body">下载入口</text>

  <path d="M 250 252 L 386 252" class="line"/>
  <path d="M 250 348 L 386 348" class="line"/>
  <path d="M 552 252 L 688 252" class="line"/>
  <path d="M 854 444 L 946 444" class="line"/>
  <path d="M 854 348 L 946 314" class="line"/>
  <path d="M 688 252 C 625 252 596 412 552 444" class="soft"/>
  <path d="M 412 444 C 326 600 218 560 168 476" class="soft"/>

  <rect x="210" y="606" width="700" height="52" rx="10" ry="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="248" y="638" class="small">一句话读图：HTTP 启动长任务，WebSocket 观察长任务，DeepAgents 把多来源信息整理成可下载交付物。</text>
</svg>
